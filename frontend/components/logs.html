<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Logs Component</title>
  
  <style>
    /* --- GENERAL PAGE LAYOUT & LIGHT AESTHETIC --- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: transparent; 
      color: #333333;
      display: flex;
      justify-content: center;
      padding: 20px; /* Reduced from 40px to fit modular layout better */
      margin: 0;
    }

    /* --- SHARED MODULE STYLING --- */
    .sim-module {
      border: 2px solid #5a5475; 
      border-radius: 8px;
      background: #ffffff; 
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      position: relative;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .module-title {
      font-family: 'Courier New', Courier, monospace;
      margin-top: 0;
      margin-bottom: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      color: #5a5475;
    }

    .btn-action {
      background-color: #ffffff;
      color: #5a5475;
      border: 2px solid #5a5475;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      width: 100%;
      margin-top: 15px;
    }

    .btn-action:hover {
      background-color: #eef0f5;
      color: #333333;
    }

    /* --- LOG MODULE SPECIFIC STYLES --- */
    .log-module {
      width: 650px; /* Matches the exact width of the LAN module */
      height: 500px; 
    }

    .log-contents {
      width: 100%;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      overflow: hidden; 
      transition: visibility 0s, opacity 0.2s linear;
    }

    /* Table Container with Custom Scrollbar */
    .table-container {
      width: 100%;
      flex-grow: 1;
      background-color: #ffffff; 
      border: 1px solid #b8b4c7; 
      border-radius: 4px;
      overflow-y: auto; 
      overflow-x: hidden;
      box-sizing: border-box; 
    }

    /* Webkit Scrollbar Styling for a hardware feel (Light Theme) */
    .table-container::-webkit-scrollbar {
      width: 8px;
    }
    .table-container::-webkit-scrollbar-track {
      background: #f0f0f5; 
      border-left: 1px solid #e2e2ec;
    }
    .table-container::-webkit-scrollbar-thumb {
      background: #b8b4c7; 
      border-radius: 4px;
    }
    .table-container::-webkit-scrollbar-thumb:hover {
      background: #5a5475; 
    }

    /* Table Styling */
    .log-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed; 
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      text-align: left;
      margin: 0;
    }

    .log-table th {
      background-color: #eef0f5;
      color: #5a5475;
      padding: 10px 15px;
      border-bottom: 1px solid #b8b4c7;
      border-right: 1px solid #e2e2ec;
      position: sticky; 
      top: 0;
      z-index: 2;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }

    .log-table th:last-child {
      border-right: none;
    }

    .log-table td {
      padding: 8px 15px;
      border-bottom: 1px solid #e2e2ec;
      border-right: 1px solid #e2e2ec;
      word-wrap: break-word; 
      color: #333333;
    }

    .log-table td:last-child {
      border-right: none;
    }

    /* Alternating row colors for readability */
    .log-table tbody tr:nth-child(even) {
      background-color: #f8f8fc; 
    }
    .log-table tbody tr:nth-child(odd) {
      background-color: #ffffff;
    }

    .log-table tr:hover td {
      background-color: #fff3e0; /* Slight orange tint on hover to match keypad/CPU theme */
    }

    /* Specific Column Data Styling */
    .col-time {
      color: #888888;
      width: 25%;
    }

    .col-source {
      color: #5a5475; 
      font-weight: bold;
      width: 20%;
    }

    .col-data {
      color: #333333;
      font-weight: bold;
      width: 35%;
    }

    .col-status {
      font-weight: bold;
      width: 20%;
    }

    /* Status Colors adjusted for light theme visibility */
    .status-success { color: #2b7a4b; } /* Darker green */
    .status-error { color: #b0413e; }   /* Darker red */
    .status-pending { color: #d28a5e; } /* Orange */

    /* Empty state styling */
    .empty-log {
      text-align: center;
      padding: 20px !important;
      color: #888888 !important;
      font-style: italic;
    }

  </style>
</head>
<body>

  <div class="log-module sim-module" id="log-module">
    <h2 class="module-title">NETWORK LOGS</h2>

    <div class="log-contents" id="log-contents">
      
      <div class="table-container">
        <table class="log-table">
          <thead>
            <tr>
              <th class="col-time">Timestamp</th>
              <th class="col-source">Source</th>
              <th class="col-data">Data Payload</th>
              <th class="col-status">Status</th>
            </tr>
          </thead>
          <tbody id="log-table-body">
            <tr id="empty-state-row">
              <td colspan="4" class="empty-log">Awaiting network activity...</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

    <button id="toggle-logs-btn" class="btn-action">Hide Logs</button>

  </div>

  <script>
    const toggleLogsBtn = document.getElementById('toggle-logs-btn');
    const logContents = document.getElementById('log-contents');
    const logTableBody = document.getElementById('log-table-body');
    const emptyStateRow = document.getElementById('empty-state-row');

    // --- Show/Hide Logic ---
    toggleLogsBtn.addEventListener('click', () => {
      // visibility hidden retains the physical dimensions of the module
      if (logContents.style.visibility === 'hidden') {
        logContents.style.visibility = 'visible';
        logContents.style.opacity = '1';
        toggleLogsBtn.textContent = 'Hide Logs';
      } else {
        logContents.style.visibility = 'hidden';
        logContents.style.opacity = '0';
        toggleLogsBtn.textContent = 'Show Logs';
      }
    });

    // --- Helper Function to Add a New Log Entry ---
    function addLog(source, data, status) {
      if (emptyStateRow && emptyStateRow.parentNode) {
        emptyStateRow.parentNode.removeChild(emptyStateRow);
      }

      const now = new Date();
      const timeString = now.toTimeString().split(' ')[0]; 

      const tr = document.createElement('tr');

      let statusClass = 'status-pending';
      if (status.toLowerCase() === 'success') statusClass = 'status-success';
      if (status.toLowerCase() === 'error') statusClass = 'status-error';

      tr.innerHTML = `
        <td class="col-time">[${timeString}]</td>
        <td class="col-source">COMPUTER ${source}</td>
        <td class="col-data">${data}</td>
        <td class="col-status ${statusClass}">${status.toUpperCase()}</td>
      `;

      logTableBody.insertBefore(tr, logTableBody.firstChild);
    }

  </script>

</body>
</html>
