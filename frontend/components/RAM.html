<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Memory Interface</title>
  
  <style>
    /* General Layout */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: transparent; /* Allows mainframe background to show through if needed */
      color: #333333; /* Dark text for light theme */
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 450px;
    }

    .main-title {
      font-family: 'Courier New', Courier, monospace;
      margin-bottom: 10px;
      font-weight: bold;
      color: #5a5475; /* Purple-grey from reference */
    }

    /* The Memory Block (Silo) */
    .memory-block {
      width: 350px;
      height: 550px; /* FIXED HEIGHT */
      border: 2px solid #5a5475; /* Themed border */
      border-radius: 6px;
      background-color: #ffffff; /* Light panel background */
      margin-bottom: 20px;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
      box-sizing: border-box;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    /* Custom Scrollbar for the memory block */
    .memory-block::-webkit-scrollbar {
      width: 8px;
    }
    .memory-block::-webkit-scrollbar-track {
      background: #f0f0f5; 
      border-left: 1px solid #e2e2ec;
    }
    .memory-block::-webkit-scrollbar-thumb {
      background: #b8b4c7; 
      border-radius: 4px;
    }
    .memory-block::-webkit-scrollbar-thumb:hover {
      background: #5a5475; 
    }

    /* RAM Module Styles */
    .ram-module {
      background-color: #fdfdfd;
      padding: 15px;
      border: 1px solid #b8b4c7;
      border-radius: 4px;
      color: #333333;
      width: 100%;
      box-sizing: border-box;
      display: none; /* Hidden until 'Show' is clicked */
    }

    .ram-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .ram-controls label {
      background-color: #eef0f5;
      padding: 4px 8px;
      border: 1px solid #b8b4c7;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-weight: 600;
      color: #5a5475;
    }

    .clear-btn {
      background-color: #ffffff;
      color: #b0413e; /* Reddish tone for clear/delete actions */
      border: 1px solid #b0413e;
      border-radius: 4px;
      padding: 5px 16px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .clear-btn:hover {
      background-color: #fce8e8;
    }

    .clear-btn:active {
      transform: translateY(1px);
    }

    .ram-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .ram-column {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .ram-cell {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .ram-cell label {
      font-size: 12px;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: #5a5475;
      width: 20px;
      text-align: right;
    }

    .ram-cell input {
      width: 80px;
      padding: 4px;
      border: 1px solid #b8b4c7;
      border-radius: 3px;
      background-color: #f8f8fc;
      color: #2b7a4b; /* Green text to match other data displays */
      text-align: center;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      font-weight: bold;
      transition: border-color 0.2s;
    }
    
    .ram-cell input:focus {
      outline: none;
      border-color: #5a5475;
      background-color: #ffffff;
    }

    /* Show Button Styles */
    .btn {
      background-color: #ffffff;
      color: #5a5475;
      border: 2px solid #5a5475;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
      font-weight: bold;
    }

    .btn:hover {
      background-color: #eef0f5;
      color: #333333;
    }

    .bottom-action {
      margin-top: 10px;
    }

    .show-btn {
      padding: 10px 40px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h2 class="main-title">Main Memory (RAM)</h2>
    
    <div class="memory-block" id="memory-block">
      
      <div class="ram-module" id="ram-module">
        <div class="ram-controls">
          <label><input type="checkbox" id="mnemonics-cb"> Mnemonics</label>
          <button class="clear-btn" id="clear-btn">Clear</button>
        </div>

        <div class="ram-grid" id="ram-grid"></div>
      </div>

    </div>

    <div class="bottom-action">
      <button class="btn show-btn" id="show-btn">Show</button>
    </div>
  </div>

  <script>
    const ramGrid = document.getElementById('ram-grid');
    
    // Generate the two columns
    const column1 = document.createElement('div');
    column1.className = 'ram-column';
    const column2 = document.createElement('div');
    column2.className = 'ram-column';

    // Loop to create 32 inputs
    for (let i = 0; i < 32; i++) {
      const cell = document.createElement('div');
      cell.className = 'ram-cell';
      
      cell.innerHTML = `
        <label>${i}</label>
        <input type="text" value="00000000" maxlength="8" class="ram-input">
      `;
      
      if (i < 16) {
        column1.appendChild(cell);
      } else {
        column2.appendChild(cell);
      }
    }
    
    ramGrid.appendChild(column1);
    ramGrid.appendChild(column2);


    // --- CLEAR BUTTON LOGIC ---
    const clearBtn = document.getElementById('clear-btn');
    clearBtn.addEventListener('click', function() {
      const allInputs = document.querySelectorAll('.ram-input');
      const mnemonicsCb = document.getElementById('mnemonics-cb');
      
      allInputs.forEach(input => {
        // If mnemonics is checked, clear leaves it empty. Otherwise, sets to 0s.
        input.value = mnemonicsCb.checked ? '' : '00000000';
      });
    });


    // --- MNEMONICS CHECKBOX LOGIC ---
    const mnemonicsCb = document.getElementById('mnemonics-cb');
    mnemonicsCb.addEventListener('change', function() {
      const allInputs = document.querySelectorAll('.ram-input');
      
      if (this.checked) {
        // If checked, clear the values
        allInputs.forEach(input => input.value = '');
      } else {
        // If unchecked, return back to zeroes
        allInputs.forEach(input => input.value = '00000000');
      }
    });


    // --- SHOW / HIDE FUNCTIONALITY ---
    const showBtn = document.getElementById('show-btn');
    const ramModule = document.getElementById('ram-module');

    showBtn.addEventListener('click', function() {
      if (ramModule.style.display === 'none' || ramModule.style.display === '') {
        ramModule.style.display = 'block';
        showBtn.textContent = 'Hide'; 
      } else {
        ramModule.style.display = 'none';
        showBtn.textContent = 'Show'; 
      }
    });
  </script>

</body>
</html>
