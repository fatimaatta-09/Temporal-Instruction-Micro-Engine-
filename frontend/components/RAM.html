<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Memory Interface</title>
  
  <style>
    /* --- GENERAL LAYOUT --- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: transparent; 
      color: #333333; 
      display: flex;
      justify-content: center;
      padding: 10px; /* Matched exactly to Hard Disk */
      margin: 0;
      box-sizing: border-box;
      height: 100vh;
      width: 100vw;
      overflow: hidden; /* Kills all scrollbars on the window */
    }

    /* --- BORDERED OUTER CONTAINER --- */
    .app-container {
      width: 100%;
      height: 100%;
      border: 2px solid #5a5475; /* Added the signature blueprint border! */
      border-radius: 8px;
      background-color: #ffffff;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .main-title {
      font-family: 'Courier New', Courier, monospace;
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 20px;
      font-weight: bold;
      color: #333333;
      text-align: center;
      letter-spacing: 1px;
    }

    /* --- MEMORY WRAPPER --- */
    .memory-block {
      width: 100%;
      flex-grow: 1; /* Takes all available space between title and Show button */
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: hidden; /* Banishes scrollbars */
      box-sizing: border-box;
    }

    .ram-module {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      display: none; /* Hidden until 'Show' is clicked */
    }

    /* --- CONTROLS --- */
    .ram-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 5px;
    }

    .ram-controls label {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      color: #5a5475;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .clear-btn {
      background-color: #ffffff;
      color: #c95c5a; 
      border: 1px solid #c95c5a;
      padding: 4px 14px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .clear-btn:hover {
      background-color: #fff0f0;
    }

    /* --- COMPACT MEMORY GRID --- */
    .ram-grid {
      display: flex;
      gap: 20px; /* Space between the two columns */
      width: 100%;
      height: calc(100% - 35px); /* Fills remaining space below controls */
      overflow: hidden; /* No scrollbars */
    }

    .ram-column {
      display: flex;
      flex-direction: column;
      flex: 1; /* Forces both columns to stretch perfectly to 50% width */
      justify-content: space-between; /* Spreads 16 inputs evenly across the height */
    }

    .ram-cell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 22px; /* Super compact to fit inside the .exe height */
    }

    .ram-cell label {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      font-weight: bold;
      color: #5a5475;
      width: 25px;
      text-align: right;
      flex-shrink: 0;
    }

    .ram-input {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      color: #3b7c97; 
      border: 1px solid #b8b4c7;
      border-radius: 3px;
      padding: 2px 6px;
      height: 20px;
      flex-grow: 1; /* STRETCHES INPUT TO FULL WIDTH */
      margin-left: 10px;
      text-align: center;
      background-color: #f8f8fc;
      font-weight: bold;
      letter-spacing: 1px;
      outline: none;
      transition: border-color 0.2s, background-color 0.2s;
      box-sizing: border-box;
    }
    
    .ram-input:focus {
      outline: none;
      border-color: #3b7c97;
      background-color: #ffffff;
    }

    /* --- SHOW/HIDE BUTTON --- */
    .bottom-action {
      width: 100%;
      margin-top: 10px;
    }

    .show-btn {
      background-color: #ffffff;
      color: #5a5475;
      border: 2px solid #5a5475;
      padding: 10px 40px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%; /* Stretches button across bottom */
    }

    .show-btn:hover {
      background-color: #eef0f5;
      color: #333333;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h2 class="main-title">Main Memory (RAM)</h2>
    
    <div class="memory-block" id="memory-block">
      
      <div class="ram-module" id="ram-module">
        <div class="ram-controls">
          <label><input type="checkbox" id="mnemonics-cb"> Mnemonics</label>
          <button class="clear-btn" id="clear-btn">Clear</button>
        </div>

        <div class="ram-grid" id="ram-grid"></div>
      </div>

    </div>

    <div class="bottom-action">
      <button class="btn show-btn" id="show-btn">Show</button>
    </div>
  </div>

  <script>
    const ramGrid = document.getElementById('ram-grid');
    
    // Generate the two columns
    const column1 = document.createElement('div');
    column1.className = 'ram-column';
    const column2 = document.createElement('div');
    column2.className = 'ram-column';

    // Loop to create 32 inputs
    for (let i = 0; i < 32; i++) {
      const cell = document.createElement('div');
      cell.className = 'ram-cell';
      
      cell.innerHTML = `
        <label>${i}</label>
        <input type="text" value="00000000" maxlength="8" class="ram-input">
      `;
      
      if (i < 16) {
        column1.appendChild(cell);
      } else {
        column2.appendChild(cell);
      }
    }
    
    ramGrid.appendChild(column1);
    ramGrid.appendChild(column2);


    // --- CLEAR BUTTON LOGIC ---
    const clearBtn = document.getElementById('clear-btn');
    clearBtn.addEventListener('click', function() {
      const allInputs = document.querySelectorAll('.ram-input');
      const mnemonicsCb = document.getElementById('mnemonics-cb');
      
      allInputs.forEach(input => {
        // If mnemonics is checked, clear leaves it empty. Otherwise, sets to 0s.
        input.value = mnemonicsCb.checked ? '' : '00000000';
      });
    });


    // --- MNEMONICS CHECKBOX LOGIC ---
    const mnemonicsCb = document.getElementById('mnemonics-cb');
    mnemonicsCb.addEventListener('change', function() {
      const allInputs = document.querySelectorAll('.ram-input');
      
      if (this.checked) {
        // If checked, clear the values
        allInputs.forEach(input => input.value = '');
      } else {
        // If unchecked, return back to zeroes
        allInputs.forEach(input => input.value = '00000000');
      }
    });


    // --- SHOW / HIDE FUNCTIONALITY ---
    const showBtn = document.getElementById('show-btn');
    const ramModule = document.getElementById('ram-module');

    showBtn.addEventListener('click', function() {
      if (ramModule.style.display === 'none' || ramModule.style.display === '') {
        ramModule.style.display = 'block';
        showBtn.textContent = 'Hide'; 
      } else {
        ramModule.style.display = 'none';
        showBtn.textContent = 'Show'; 
      }
    });
  </script>

</body>
</html>
