<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Component</title>
  
  <style>
    /* --- GENERAL LAYOUT --- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: transparent; 
      color: #333333;
      display: flex;
      justify-content: center;
      padding: 10px; 
      margin: 0;
      height: 100vh; /* Locks to the iframe boundary */
      box-sizing: border-box;
      overflow: hidden; /* Banishes scrollbars */
    }

    /* --- OUTER CONTAINER (FRAMED) --- */
    .peripheral-container {
      width: 100%;
      height: 100%;
      border: 2px solid #5a5475; /* Standard module border */
      border-radius: 8px;
      background-color: #ffffff; 
      padding: 20px; 
      display: flex;
      flex-direction: column;
      gap: 15px; 
      box-sizing: border-box;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    /* BUMPED: Main Title */
    .main-title {
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      font-size: 22px; /* Matched Blueprint */
      font-weight: bold;
      color: #333333;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0; 
    }

    /* --- 7-SEGMENT DISPLAY --- */
    .display-wrapper {
      width: 100%;
      height: 100px;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }

    .segmented-display-area {
      border: 2px solid #75b8b6; 
      border-radius: 6px;
      background-color: #ffffff; 
      padding: 10px;
      display: flex;
      justify-content: space-evenly; 
      align-items: center;
      width: 100%;
      height: 100%; 
      box-sizing: border-box;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.05);
    }

    .seg-digit {
      height: 90%; 
      width: auto;
      max-width: 18%; 
    }

    .seg {
      fill: #eef0f5; 
      transition: fill 0.1s ease;
    }

    .seg.on {
      fill: #2dd4bf; 
      filter: drop-shadow(0 0 2px rgba(45, 212, 191, 0.3));
    }

    /* --- KEYPAD --- */
    .keypad-wrapper {
      width: 100%;
      flex-grow: 1; /* Spring-loads the keypad to fill remaining frame height */
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .keypad-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); 
      grid-template-rows: repeat(4, 1fr); 
      gap: 12px; 
      flex-grow: 1; 
      height: 100%; 
    }

    /* BUMPED: Standardized Button Style */
    .btn {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #ffffff;
      color: #5a5475; 
      border: 2px solid #d28a5e; 
      cursor: pointer;
      border-radius: 6px;
      font-size: 20px; /* Perfect size for digit buttons */
      font-weight: bold;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%; 
      padding: 0; 
      text-transform: uppercase;
    }

    .btn:hover:not(.btn-blank) {
      background-color: #fff3e0;
      color: #d28a5e;
    }

    /* BUMPED: Action Text Buttons (Clear, Enter) */
    .btn-text {
      font-size: 16px; /* Matched Blueprint */
      letter-spacing: 1px;
    }

    .btn-blank {
      border: 2px solid #e2e2ec;
      background-color: transparent;
      cursor: default;
      box-shadow: none;
    }

    .btn-enter {
      grid-column: 4;
      grid-row: span 2; 
    }

    .btn-zero {
      grid-column: span 2; 
    }
  </style>
</head>
<body>

  <div class="peripheral-container">
    <h2 class="main-title">DISPLAY</h2>

    <div class="display-wrapper" id="display-wrapper">
      <div class="segmented-display-area">
        
        <svg class="seg-digit" viewBox="0 0 60 100" id="digit-1">
          <polygon class="seg a" points="10,10 15,5 45,5 50,10 45,15 15,15" />
          <polygon class="seg b" points="50,10 55,15 55,45 50,50 45,45 45,15" />
          <polygon class="seg c" points="50,50 55,55 55,85 50,90 45,85 45,55" />
          <polygon class="seg d" points="10,90 15,95 45,95 50,90 45,85 15,85" />
          <polygon class="seg e" points="10,50 5,55 5,85 10,90 15,85 15,55" />
          <polygon class="seg f" points="10,10 5,15 5,45 10,50 15,45 15,15" />
          <polygon class="seg g" points="10,50 15,45 45,45 50,50 45,55 15,55" />
        </svg>

        <svg class="seg-digit" viewBox="0 0 60 100" id="digit-2">
          <polygon class="seg a" points="10,10 15,5 45,5 50,10 45,15 15,15" />
          <polygon class="seg b" points="50,10 55,15 55,45 50,50 45,45 45,15" />
          <polygon class="seg c" points="50,50 55,55 55,85 50,90 45,85 45,55" />
          <polygon class="seg d" points="10,90 15,95 45,95 50,90 45,85 15,85" />
          <polygon class="seg e" points="10,50 5,55 5,85 10,90 15,85 15,55" />
          <polygon class="seg f" points="10,10 5,15 5,45 10,50 15,45 15,15" />
          <polygon class="seg g" points="10,50 15,45 45,45 50,50 45,55 15,55" />
        </svg>

        <svg class="seg-digit" viewBox="0 0 60 100" id="digit-3">
          <polygon class="seg a" points="10,10 15,5 45,5 50,10 45,15 15,15" />
          <polygon class="seg b" points="50,10 55,15 55,45 50,50 45,45 45,15" />
          <polygon class="seg c" points="50,50 55,55 55,85 50,90 45,85 45,55" />
          <polygon class="seg d" points="10,90 15,95 45,95 50,90 45,85 15,85" />
          <polygon class="seg e" points="10,50 5,55 5,85 10,90 15,85 15,55" />
          <polygon class="seg f" points="10,10 5,15 5,45 10,50 15,45 15,15" />
          <polygon class="seg g" points="10,50 15,45 45,45 50,50 45,55 15,55" />
        </svg>

        <svg class="seg-digit" viewBox="0 0 60 100" id="digit-4">
          <polygon class="seg a" points="10,10 15,5 45,5 50,10 45,15 15,15" />
          <polygon class="seg b" points="50,10 55,15 55,45 50,50 45,45 45,15" />
          <polygon class="seg c" points="50,50 55,55 55,85 50,90 45,85 45,55" />
          <polygon class="seg d" points="10,90 15,95 45,95 50,90 45,85 15,85" />
          <polygon class="seg e" points="10,50 5,55 5,85 10,90 15,85 15,55" />
          <polygon class="seg f" points="10,10 5,15 5,45 10,50 15,45 15,15" />
          <polygon class="seg g" points="10,50 15,45 45,45 50,50 45,55 15,55" />
        </svg>

        <svg class="seg-digit" viewBox="0 0 60 100" id="digit-5">
          <polygon class="seg a" points="10,10 15,5 45,5 50,10 45,15 15,15" />
          <polygon class="seg b" points="50,10 55,15 55,45 50,50 45,45 45,15" />
          <polygon class="seg c" points="50,50 55,55 55,85 50,90 45,85 45,55" />
          <polygon class="seg d" points="10,90 15,95 45,95 50,90 45,85 15,85" />
          <polygon class="seg e" points="10,50 5,55 5,85 10,90 15,85 15,55" />
          <polygon class="seg f" points="10,10 5,15 5,45 10,50 15,45 15,15" />
          <polygon class="seg g" points="10,50 15,45 45,45 50,50 45,55 15,55" />
        </svg>

      </div>
    </div>
    
    <div class="keypad-wrapper" id="keypad-wrapper">
      <div class="keypad-grid">
        
        <button class="btn">7</button>
        <button class="btn">8</button>
        <button class="btn">9</button>
        <button class="btn btn-text">CLEAR</button>

        <button class="btn">4</button>
        <button class="btn">5</button>
        <button class="btn">6</button>
        <div class="btn btn-blank"></div>

        <button class="btn">1</button>
        <button class="btn">2</button>
        <button class="btn">3</button>
        <button class="btn btn-enter btn-text">ENTER</button>

        <button class="btn btn-zero">0</button>
        <button class="btn">.</button>

      </div>
    </div>

  </div>

  <script>

    const toggleDisplayBtn = document.getElementById('toggle-display-btn');
    const toggleKeypadBtn = document.getElementById('toggle-keypad-btn');
    
    const displayWrapper = document.getElementById('display-wrapper');
    const displaySeparator = document.getElementById('display-separator');
    const keypadWrapper = document.getElementById('keypad-wrapper');

    // Helper to check if both are visible to show/hide the separator line
    function updateSeparator() {
      if (displayWrapper && keypadWrapper && displaySeparator) {
        if (displayWrapper.style.display === 'block' && keypadWrapper.style.display === 'block') {
          displaySeparator.style.display = 'block';
        } else {
          displaySeparator.style.display = 'none';
        }
      }
    }

    if (toggleDisplayBtn) {
      toggleDisplayBtn.addEventListener('click', function() {
        if (displayWrapper.style.display === 'none' || displayWrapper.style.display === '') {
          displayWrapper.style.display = 'block';
          toggleDisplayBtn.textContent = 'Hide Display';
        } else {
          displayWrapper.style.display = 'none';
          toggleDisplayBtn.textContent = 'Show Display';
        }
        updateSeparator();
      });
    }

    if (toggleKeypadBtn) {
      toggleKeypadBtn.addEventListener('click', function() {
        if (keypadWrapper.style.display === 'none' || keypadWrapper.style.display === '') {
          keypadWrapper.style.display = 'block';
          toggleKeypadBtn.textContent = 'Hide Keypad';
        } else {
          keypadWrapper.style.display = 'none';
          toggleKeypadBtn.textContent = 'Show Keypad';
        }
        updateSeparator();
      });
    }
  </script>

</body>
</html>
