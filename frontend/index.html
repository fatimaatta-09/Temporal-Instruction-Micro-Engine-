<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-Bit Operational Core Simulator</title>
    <style>
        /* --- MAINFRAME BLUEPRINT THEME --- */
        body {
            background-color: #f0f0f5;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            
            background-image:
                linear-gradient(#e2e2ec 1px, transparent 1px),
                linear-gradient(90deg, #e2e2ec 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- MAIN APPLICATION WINDOW --- */
        .app-window {
            width: 1800px; 
            height: 950px;
            background-color: #ffffff;
            border: 2px solid #5a5475; 
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform-origin: center center;
        }

        /* --- TITLE BAR --- */
        .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8f8fc;
            border-bottom: 2px solid #5a5475;
            padding: 8px 15px;
        }

        .title-text {
            font-size: 22px;
            font-weight: bold;
            color: #333333;
            letter-spacing: 0.5px;
        }

        .title-btn-group {
            display: flex;
            gap: 8px;
        }

        .title-btn {
            background: #ffffff;
            border: 2px solid #b8b4c7;
            border-radius: 4px;
            width: 32px;
            height: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #5a5475;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- 3-PANEL LAYOUT --- */
        .dashboard-layout {
            display: flex;
            flex-grow: 1;
            padding: 15px;
            gap: 15px;
            background-color: transparent;
        }

        .panel {
            border: 2px solid #5a5475;
            border-radius: 6px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .panel-header {
            text-align: center;
            padding: 8px;
            border-bottom: 1px solid #5a5475;
            font-weight: 600;
            font-size: 14px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: #fdfdfd;
        }

        /* Fixed Proportional Panel Sizes */
        .panel-left { width: 420px; flex-shrink: 0; }
        .panel-center { flex-grow: 1; min-width: 600px; }
        .panel-right { width: 450px; flex-shrink: 0; }

        /* --- IFRAME MODULAR CONTAINERS --- */
        .iframe-container {
            flex-grow: 1;
            background-image:
                linear-gradient(#eef0f5 1px, transparent 1px),
                linear-gradient(90deg, #eef0f5 1px, transparent 1px);
            background-size: 15px 15px;
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
        }

        /* Center panel layout */
        .panel-center .iframe-container {
            padding: 0;
            overflow-y: auto;
            justify-content: flex-start;
        }

        iframe {
            border: none;
            background: transparent;
        }

        /* --- SCALED WRAPPER SYSTEM --- */
        .wrap {
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 15px; 
        }
        .wrap iframe {
            position: absolute;
            top: 0;
        }

        /* Left Panel Stack */
        .wrap-hd { height: 360px; } 
        .wrap-hd iframe { width: 400px; height: 350px; transform: scale(1); transform-origin: top center; }
        
        .wrap-ram { height: 580px; } 
        .wrap-ram iframe { width: 450px; height: 650px; transform: scale(0.88); transform-origin: top center; }

        /* Center Panel Stack */
        /* Increased height to 640px to let the CPU Auto-Scaler expand it larger */
        .cpu-wrap { width: 100%; height: 640px; flex-shrink: 0; }
        .cpu-iframe { width: 100%; height: 100%; }
        
        /* Adjusted scale to 0.72 so it fits perfectly inside the panel width without clipping */
        .clock-center-wrap { height: 190px; margin-top: 0; width: 100%; display: flex; justify-content: center; }
        .clock-center-wrap iframe { width: 1200px; height: 260px; transform: scale(0.72); transform-origin: top center; }

        /* Right Panel Stack */
        .wrap-screen { height: 530px; } 
        .wrap-screen iframe { width: 400px; height: 550px; transform: scale(1.08, 0.95); transform-origin: top center; }

        .wrap-printer { height: 190px; } 
        .wrap-printer iframe { width: 650px; height: 280px; transform: scale(0.65); transform-origin: top center; }

        .wrap-lan { height: 320px; } 
        .wrap-lan iframe { width: 700px; height: 520px; transform: scale(0.61); transform-origin: top center; }

        .wrap-logs { height: 345px; } 
        .wrap-logs iframe { width: 650px; height: 520px; transform: scale(0.65); transform-origin: top center; }

        /* Scrollbar styling */
        .iframe-container::-webkit-scrollbar { width: 8px; }
        .iframe-container::-webkit-scrollbar-track { background: transparent; }
        .iframe-container::-webkit-scrollbar-thumb { background: #b8b4c7; border-radius: 4px; }
        .iframe-container::-webkit-scrollbar-thumb:hover { background: #5a5475; }

    </style>
</head>
<body>

    <div class="app-window" id="app-window">
        <div class="title-bar">
            <div class="title-btn-group">
                <button class="title-btn">☰</button>
            </div>
            <div class="title-text">4-BIT OPERATIONAL CORE SIMULATOR (v2.0)</div>
            <div class="title-btn-group">
                <button class="title-btn">◀</button>
                <button class="title-btn">⚙</button>
            </div>
        </div>

        <div class="dashboard-layout">
            
            <div class="panel panel-left">
                <div class="panel-header">PROJECT & DATA MANAGMENT</div>
                <div class="iframe-container">
                    <div class="wrap wrap-hd">
                        <iframe src="components/HardDisk.html"></iframe>
                    </div>
                    <div class="wrap wrap-ram">
                        <iframe src="components/RAM.html"></iframe>
                    </div>
                </div>
            </div>

            <div class="panel panel-center">
                <div class="panel-header">OPERATIONAL CORE SCHEMATIC</div>
                <div class="iframe-container">
                    <div class="cpu-wrap">
                        <iframe src="components/cpu.html" class="cpu-iframe"></iframe>
                    </div>
                    <div class="wrap clock-center-wrap">
                        <iframe src="components/clock.html"></iframe>
                    </div>
                </div>
            </div>

            <div class="panel panel-right">
                <div class="panel-header">PERIPHERAL MODULES & LOGS</div>
                <div class="iframe-container">
                    <div class="wrap wrap-screen">
                        <iframe src="components/screen.html"></iframe>
                    </div>
                    <div class="wrap wrap-printer">
                        <iframe src="components/printer.html"></iframe>
                    </div>
                    <div class="wrap wrap-lan">
                        <iframe src="components/lan_network.html"></iframe>
                    </div>
                    <div class="wrap wrap-logs">
                        <iframe src="components/logs.html"></iframe>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function scaleDashboard() {
            const appWindow = document.getElementById('app-window');
            const containerWidth = window.innerWidth - 40; 
            const containerHeight = window.innerHeight - 40;
            
            const targetWidth = 1800;  
            const targetHeight = 950; 

            const scaleX = containerWidth / targetWidth;
            const scaleY = containerHeight / targetHeight;
            const scale = Math.min(scaleX, scaleY, 1); 

            appWindow.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', scaleDashboard);
        scaleDashboard();
    </script>

</body>
</html>
