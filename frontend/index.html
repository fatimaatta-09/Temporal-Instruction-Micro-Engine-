    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>4-Bit Operational Core Simulator</title>
        <style>
            /* --- MAINFRAME BLUEPRINT THEME --- */
            body {
                background-color: #f0f0f5;
                margin: 0;
                padding: 20px;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                box-sizing: border-box;
                background-image:
                    linear-gradient(#e2e2ec 1px, transparent 1px),
                    linear-gradient(90deg, #e2e2ec 1px, transparent 1px);
                background-size: 20px 20px;
            }

            .app-window {
                width: 1800px; 
                height: 950px;
                background-color: #ffffff;
                border: 2px solid #5a5475; 
                border-radius: 8px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                transform-origin: center center;
            }

            .title-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: #f8f8fc;
                border-bottom: 2px solid #5a5475;
                padding: 8px 15px;
            }

            .title-text {
                font-size: 22px;
                font-weight: bold;
                color: #333333;
                letter-spacing: 0.5px;
            }

            .dashboard-layout {
                display: flex;
                flex-grow: 1;
                padding: 15px;
                gap: 15px;
                background-color: transparent;
            }

            .panel {
                border: 2px solid #5a5475;
                border-radius: 6px;
                background-color: #ffffff;
                display: block; 
                position: relative;
                overflow: hidden;
            }

            .panel-header {
                text-align: center;
                padding: 8px;
                height: 35px; 
                border-bottom: 1px solid #5a5475;
                font-weight: 600;
                font-size: 14px;
                color: #333;
                text-transform: uppercase;
                letter-spacing: 1px;
                background-color: #fdfdfd;
                box-sizing: border-box;
                position: absolute;
                top: 0; left: 0; right: 0;
                z-index: 10;
            }

            .panel-left { width: 420px; flex-shrink: 0; }
            .panel-center { width: calc(1800px - 420px - 450px - 60px); } 
            .panel-right { width: 450px; flex-shrink: 0; }

            .iframe-container {
                position: absolute;
                top: 35px; 
                bottom: 0; 
                left: 0;
                right: 0;
                background-image:
                    linear-gradient(#eef0f5 1px, transparent 1px),
                    linear-gradient(90deg, #eef0f5 1px, transparent 1px);
                background-size: 15px 15px;
                overflow-y: auto; 
                overflow-x: hidden;
                padding: 15px 0;
                box-sizing: border-box;
            }

            /* BANISH SCROLLBAR IN LEFT PANEL */
            .panel-left .iframe-container {
                overflow: hidden;
                display: flex;
                flex-direction: column;
                padding-top: 10px;
            }

            .panel-center .iframe-container { overflow: hidden; padding: 0; }

            iframe { border: none; background: transparent; }

            .wrap {
                display: block;
                width: 100%;
                position: relative;
                margin-bottom: 10px; 
            }
            .wrap iframe {
                position: absolute;
                top: 0;
                left: 50%; 
            }

            /* --- LEFT PANEL: PERFECT FIT CALCULATION --- */
            .wrap-hd { 
                height: 305px; /* Shrunk to perfectly fit internal content only */
                flex-shrink: 0; 
            } 
            .wrap-hd iframe { 
                width: 480px; 
                height: 382px; /* Internal height matching HardDisk.html */
                transform: translateX(-50%) scale(0.8); 
                transform-origin: top center; 
            }
            
            .wrap-ram { 
                flex-grow: 1; /* RAM takes all remaining vertical space */
                margin-bottom: 0;
            } 
            .wrap-ram iframe { 
                width: 530px; 
                height: 100%; /* Dynamically fills the remaining panel height */
                transform: translateX(-50%) scale(0.72); 
                transform-origin: top center; 
            }

            /* --- CENTER PANEL --- */
            .cpu-wrap { width: 100%; height: calc(100% - 220px); position: relative; overflow: hidden; }
            .cpu-iframe { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
            .wrap-clock { width: 100%; height: 220px; position: relative; overflow: hidden; }
            .wrap-clock iframe { width: 1200px; height: 280px; position: absolute; top: 0; left: 50%; transform: translateX(-50%) scale(0.72); transform-origin: top center; }

            /* --- RIGHT PANEL --- */
            .wrap-screen { height: 460px; } 
            .wrap-screen iframe { width: 440px; height: 550px; transform: translateX(-50%) scale(0.95, 0.85); transform-origin: top center; }
            .wrap-printer { height: 190px; } 
            .wrap-printer iframe { width: 730px; height: 340px; transform: translateX(-50%) scale(0.57); transform-origin: top center; }
            .wrap-lan { height: 310px; } 
            .wrap-lan iframe { width: 690px; height: 520px; transform: translateX(-50%) scale(0.6); transform-origin: top center; }
            .wrap-logs { height: 320px; } 
            .wrap-logs iframe { width: 690px; height: 540px; transform: translateX(-50%) scale(0.6); transform-origin: top center; }
        </style>
    </head>
    <body>
        <div class="app-window" id="app-window">
            <div class="title-bar">
                <div class="title-text">4-BIT OPERATIONAL CORE SIMULATOR (v2.0)</div>
            </div>
            <div class="dashboard-layout">
                <div class="panel panel-left">
                    <div class="panel-header">PROJECT & DATA MANAGMENT</div>
                    <div class="iframe-container">
                        <div class="wrap wrap-hd">
                            <iframe src="components/HardDisk.html" scrolling="no"></iframe>
                        </div>
                        <div class="wrap wrap-ram">
                            <iframe src="components/RAM.html" scrolling="no"></iframe>
                        </div>
                    </div>
                </div>
                <div class="panel panel-center">
                    <div class="panel-header">OPERATIONAL CORE SCHEMATIC</div>
                    <div class="iframe-container">
                        <div class="cpu-wrap">
                            <iframe src="components/cpu.html" class="cpu-iframe" scrolling="no"></iframe>
                        </div>
                        <div class="wrap-clock">
                            <iframe src="components/clock.html" scrolling="no"></iframe>
                        </div>
                    </div>
                </div>
                <div class="panel panel-right">
                    <div class="panel-header">PERIPHERAL MODULES & LOGS</div>
                    <div class="iframe-container">
                        <div class="wrap wrap-screen"><iframe src="components/screen.html" scrolling="no"></iframe></div>
                        <div class="wrap wrap-printer"><iframe src="components/printer.html" scrolling="no"></iframe></div>
                        <div class="wrap wrap-lan"><iframe src="components/lan_network.html" scrolling="no"></iframe></div>
                        <div class="wrap wrap-logs"><iframe src="components/logs.html" scrolling="no"></iframe></div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            function scaleDashboard() {
                const appWindow = document.getElementById('app-window');
                const scale = Math.min((window.innerWidth - 40) / 1800, (window.innerHeight - 40) / 950, 1); 
                appWindow.style.transform = `scale(${scale})`;
            }
            window.addEventListener('resize', scaleDashboard);
            scaleDashboard();
        </script>
    </body>
    </html>
