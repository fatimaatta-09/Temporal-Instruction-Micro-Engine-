<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-Bit Operational Core Simulator</title>
    <style>
        /* --- MAINFRAME BLUEPRINT THEME --- */
        body {
            background-color: #f0f0f5;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            background-image:
                linear-gradient(#e2e2ec 1px, transparent 1px),
                linear-gradient(90deg, #e2e2ec 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .app-window {
            width: 1800px; 
            height: 950px;
            background-color: #ffffff;
            border: 2px solid #5a5475; 
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform-origin: center center;
            position: relative; 
        }

        .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8f8fc;
            border-bottom: 2px solid #5a5475;
            padding: 8px 15px;
        }

        .title-text {
            font-size: 22px;
            font-weight: bold;
            color: #333333;
            letter-spacing: 0.5px;
        }

        .title-btn {
            background: #ffffff;
            border: 2px solid #b8b4c7;
            border-radius: 4px;
            width: 32px;
            height: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #5a5475;
            font-weight: bold;
            cursor: pointer;
        }

        .title-btn-group { 
            display: flex; 
            gap: 8px; 
        }

        .dashboard-layout {
            display: flex;
            flex-grow: 1;
            padding: 15px;
            gap: 15px;
            background-color: transparent;
        }

        .panel {
            border: 2px solid #5a5475;
            border-radius: 6px;
            background-color: #ffffff;
            display: block; 
            position: relative;
            overflow: hidden; 
        }

        /* BROKEN CLIP LOCK SO OUR HUMP HACK CAN STICK OUT */
        .panel-center { 
            width: calc(1800px - 420px - 450px - 60px); 
            overflow: visible !important; 
        } 

        .panel-header {
            text-align: center;
            padding: 8px;
            height: 35px; 
            border-bottom: 1px solid #5a5475;
            font-weight: 600;
            font-size: 14px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: #fdfdfd;
            box-sizing: border-box;
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10;
            border-radius: 4px 4px 0 0;
        }

        .panel-left { width: 420px; flex-shrink: 0; }
        .panel-right { width: 450px; flex-shrink: 0; }

        /* --- IFRAME CONTAINERS --- */
        .iframe-container {
            position: absolute;
            top: 35px; 
            bottom: 0; 
            left: 0;
            right: 0;
            background-image:
                linear-gradient(#eef0f5 1px, transparent 1px),
                linear-gradient(90deg, #eef0f5 1px, transparent 1px);
            background-size: 15px 15px;
            overflow: hidden; 
            box-sizing: border-box;
        }

        .panel-left .iframe-container,
        .panel-right .iframe-container {
            display: flex;
            flex-direction: column;
            padding: 10px 0;
        }

        /* CENTER PANEL CONFIGURATION */
        .panel-center .iframe-container { 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 10px 0 10px !important; 
            overflow: visible !important; 
        }

        iframe { border: none; background: transparent; }

        .wrap {
            display: block;
            width: 100%;
            position: relative;
            margin-bottom: 10px; 
        }

        /* --- LEFT PANEL --- */
        .wrap-hd { height: 325px; position: relative; flex-shrink: 0; } 
        .wrap-hd iframe { width: 480px; height: calc(100% / 0.8); position: absolute; top: 0; left: 50%; transform: translateX(-50%) scale(0.8); transform-origin: top center; }
        
        .wrap-ram { flex-grow: 1; position: relative; margin-bottom: 0; } 
        .wrap-ram iframe { width: 530px; height: calc(100% / 0.72); position: absolute; top: 0; left: 50%; transform: translateX(-50%) scale(0.72); transform-origin: top center; }

        /* --- CENTER PANEL MODULES --- */
        .cpu-wrap { 
            width: 850px; 
            height: calc(850px * (760 / 1200)); 
            position: relative; 
            overflow: hidden; 
            flex-shrink: 0; 
            margin-bottom: 10px; 
            z-index: 2;
        }
        
        .cpu-iframe { 
            width: 1200px; 
            height: 760px; 
            position: absolute; 
            top: 0; 
            left: 0; 
            transform: scale(calc(850 / 1200));
            transform-origin: top left;
        }
        
        .wrap-clock { 
            width: 850px; 
            height: calc(850px * (240 / 1200)); 
            position: relative; 
            overflow: hidden; 
            margin: 0 0 10px 0; 
            padding: 0; 
            flex-shrink: 0;
            z-index: 1;
        }
        
        .wrap-clock iframe { 
            width: 1200px; 
            height: 240px; 
            position: absolute; 
            top: 0; 
            left: 0; 
            transform: scale(calc(850 / 1200)); 
            transform-origin: top left; 
        }

        /* --- THE HUMP: GROUP INFO CONSOLE --- */
        .info-console-wrap {
            width: 850px; 
            flex-grow: 1; 
            padding: 0; 
            margin: 0;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative; 
        }

        /* REFINED WHITE BOX HACK (No more broken squiggly corners) */
        .border-cover-hack {
            position: absolute;
            bottom: -2px; 
            left: 2px; /* Stay inside the vertical border lines */
            width: calc(100% - 4px); 
            height: 4px; 
            background-color: #ffffff;
            z-index: 100;
        }

        .info-console {
            flex-grow: 1;
            border: 2px solid #5a5475;
            background-color: #ffffff;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13.5px; /* Shrunk font slightly to fit text */
            color: #5a5475;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            
            border-bottom: none !important; 
            border-radius: 8px 8px 0 0 !important; 
            margin-bottom: 0 !important;
        }

        .info-header {
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px dashed #b8b4c7;
            padding-bottom: 8px;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
            color: #3b7c97;
            font-size: 16px;
        }

        /* --- HORIZONTAL TEAM ROW STYLING --- */
        .info-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-grow: 1; 
            width: 100%;
        }

        .team-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* Shrunk gap so names don't explode out the sides */
            width: 100%;
            white-space: nowrap; 
        }

        .team-label {
            font-weight: bold;
            color: #333333;
        }

        .team-member {
            color: #5a5475;
        }

        /* --- RIGHT PANEL --- */
        .wrap-screen { flex-grow: 1; position: relative; margin-bottom: 15px; min-height: 400px; } 
        .wrap-screen iframe { width: 420px; height: 100%; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
        
        .wrap-printer { height: 120px; position: relative; flex-shrink: 0; margin-bottom: 15px; } 
        .wrap-printer iframe { width: 730px; height: calc(100% / 0.55); position: absolute; top: 0; left: 50%; transform: translateX(-50%) scale(0.55); transform-origin: top center; }
        
        .wrap-lan { height: 210px; position: relative; flex-shrink: 0; margin-bottom: 5px; } 
        .wrap-lan iframe { width: 1100px; height: calc(100% / 0.4); position: absolute; top: 0; left: 50%; transform: translateX(-50%) scale(0.4); transform-origin: top center; }

        /* --- LOGS MODAL --- */
        .logs-modal-overlay {
            position: absolute; 
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent; 
            backdrop-filter: none;
            display: none; 
            pointer-events: none; 
            z-index: 1000;
        }

        .logs-modal-content {
            position: absolute;
            bottom: 30px; 
            right: 30px; 
            width: 550px; 
            height: 380px;
            background: transparent;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            pointer-events: auto; 
            animation: slideInCorner 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        @keyframes slideInCorner {
            from { transform: translate(50px, 50px) scale(0.9); opacity: 0; }
            to { transform: translate(0, 0) scale(1); opacity: 1; }
        }

        .wrap-logs-popup {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .wrap-logs-popup iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px; 
        }

    </style>
</head>
<body>
    <div class="app-window" id="app-window">
        
        <div class="title-bar">
            <div class="title-btn-group"><button class="title-btn">☰</button></div>
            <div class="title-text">4-BIT OPERATIONAL CORE SIMULATOR (v2.0)</div>
            <div class="title-btn-group"><button class="title-btn">◀</button><button class="title-btn">⚙</button></div>
        </div>

        <div class="dashboard-layout">
            
            <div class="panel panel-left">
                <div class="panel-header">PROJECT & DATA MANAGMENT</div>
                <div class="iframe-container">
                    <div class="wrap wrap-hd"><iframe src="{{ url_for('static', filename='components/HardDisk.html') }}" scrolling="no"></iframe></div>
                    <div class="wrap wrap-ram"><iframe src="{{ url_for('static', filename='components/RAM.html') }}" scrolling="no"></iframe></div>
                </div>
            </div>
            
            <div class="panel panel-center">
                <div class="panel-header">OPERATIONAL CORE SCHEMATIC</div>
                <div class="iframe-container">
                    
                    <div class="cpu-wrap"><iframe src="{{ url_for('static', filename='components/cpu.html') }}" class="cpu-iframe" scrolling="no"></iframe></div>
                    <div class="wrap-clock"><iframe src="{{ url_for('static', filename='components/clock.html') }}" scrolling="no"></iframe></div>
                    
                    <div class="info-console-wrap">
                        <div class="info-console" id="system-info-console">
                            <div class="info-header">Project Group Information</div>
                            
                            <div class="info-body">
                                <div class="team-row">
                                    <span class="team-label">TEAM MEMBERS:</span>
                                    <span class="team-member">• Student Name 1 (ID: XXXXXX)</span>
                                    <span class="team-member">• Student Name 2 (ID: XXXXXX)</span>
                                    <span class="team-member">• Student Name 3 (ID: XXXXXX)</span>
                                </div>
                            </div>
                            
                        </div>
                        <div class="border-cover-hack"></div>
                    </div>

                </div>
            </div>
            
            <div class="panel panel-right">
                <div class="panel-header">PERIPHERAL MODULES & LOGS</div>
                <div class="iframe-container">
                    <div class="wrap wrap-screen"><iframe src="{{ url_for('static', filename='components/screen.html') }}" scrolling="no"></iframe></div>
                    <div class="wrap wrap-printer"><iframe src="{{ url_for('static', filename='components/printer.html') }}" scrolling="no"></iframe></div>
                    <div class="wrap wrap-lan"><iframe src="{{ url_for('static', filename='components/lan_network.html') }}" scrolling="no"></iframe></div>
                </div>
            </div>

        </div>

        <div class="logs-modal-overlay" id="logs-modal" onclick="closeNetworkLogsPopup()">
            <div class="logs-modal-content" onclick="event.stopPropagation()">
                <div class="wrap-logs-popup">
                    <iframe src="{{ url_for('static', filename='components/logs.html') }}" scrolling="no"></iframe>
                </div>
            </div>
        </div>

    </div>

    <script>
        function scaleDashboard() {
            const appWindow = document.getElementById('app-window');
            const scale = Math.min((window.innerWidth - 40) / 1800, (window.innerHeight - 40) / 950, 1); 
            appWindow.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleDashboard);
        scaleDashboard();

        function toggleNetworkLogsPopup() {
            const modal = document.getElementById('logs-modal');
            if (modal.style.display === 'block') {
                modal.style.display = 'none';
            } else {
                modal.style.display = 'block';
            }
        }

        function closeNetworkLogsPopup() {
            document.getElementById('logs-modal').style.display = 'none';
        }

        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'toggleNetworkLogsPopup') {
                toggleNetworkLogsPopup();
            } else if (event.data && event.data.action === 'closeNetworkLogsPopup') {
                closeNetworkLogsPopup();
            }
        });
    </script>
</body>
</html>
