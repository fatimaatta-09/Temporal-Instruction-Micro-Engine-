<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hard Disk Component</title>
  
  <script src="/static/socket.io.min.js"></script>

  <style>
    /* --- GENERAL LAYOUT --- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: transparent; 
      color: #333333; 
      display: flex;
      justify-content: center;
      padding: 10px; 
      margin: 0;
      box-sizing: border-box;
      overflow: hidden;
    }

    /* --- HARD DISK CONTAINER --- */
    .hard-disk-container {
      width: 100%; 
      border: 2px solid #5a5475; 
      border-radius: 8px;
      background-color: #ffffff; 
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    /* Main Title - Matches Blueprint */
    .main-title {
      font-family: 'Courier New', Courier, monospace;
      margin-top: 0;
      margin-bottom: 5px;
      font-size: 22px; 
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #5a5475;
      text-align: center;
    }
    
    .file-status {
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        color: #d28a5e;
        margin-bottom: 15px;
        font-weight: bold;
        height: 15px;
    }

    /* --- TRACE LOG TABLE STYLES --- */
    .trace-log-wrapper {
      width: 100%;
      margin-bottom: 15px;
      display: block;
    }

    .table-container {
      height: 180px; 
      width: 100%; 
      overflow-y: auto; 
      border: 2px solid #b8b4c7; 
      border-radius: 4px;
      background-color: #ffffff;
    }

    .trace-log-table {
      width: 100%;
      border-collapse: collapse;
      font-family: monospace;
    }

    .trace-log-table th {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #eef0f5; 
      color: #5a5475;
      position: sticky;
      top: 0;
      padding: 6px 10px;
      text-align: left;
      font-weight: bold;
      font-size: 13px; 
      text-transform: uppercase;
      border-bottom: 2px solid #b8b4c7; 
      border-right: 1px solid #e2e2ec;
      letter-spacing: 1px;
    }

    .trace-log-table th:last-child {
        border-right: none;
    }

    .trace-log-table td {
      padding: 6px 10px;
      border: 1px solid #e2e2ec;
      font-size: 14px; 
      font-weight: bold;
      color: #3b7c97; 
    }
    
    /* Center the Address and Hex columns */
    .trace-log-table td:first-child, .trace-log-table td:last-child {
        text-align: center;
    }

    .trace-log-table tbody tr:nth-child(even) { background-color: #f8f8fc; }
    .trace-log-table tbody tr:nth-child(odd) { background-color: #ffffff; }

    /* Custom Scrollbar for the table */
    .table-container::-webkit-scrollbar { width: 8px; }
    .table-container::-webkit-scrollbar-track { background: #f0f0f5; }
    .table-container::-webkit-scrollbar-thumb { background: #b8b4c7; border-radius: 4px; }
    .table-container::-webkit-scrollbar-thumb:hover { background: #5a5475; }

    /* --- CONTROLS & BUTTONS --- */
    .disk-controls {
      display: block; 
      width: 100%;
      margin-top: 5px;
    }

    .button-grid {
      display: flex;
      justify-content: space-between;
      width: 100%;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .button-group h4 {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px; 
      margin: 0 0 8px 0;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5a5475;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #ffffff;
      color: #5a5475;
      border: 2px solid #5a5475; 
      padding: 8px 16px; 
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px; 
      font-weight: bold;
      text-transform: uppercase; 
      letter-spacing: 1px;
      transition: all 0.2s ease;
      width: 80px; /* Uniform button width */
    }

    .btn:hover {
      background-color: #eef0f5;
      color: #333333;
    }
    
    /* Special colors for specific actions */
    .btn-save:hover { background-color: #4CAF50; color: white; border-color: #4CAF50;}
    .btn-edit:hover { background-color: #00d2ff; color: white; border-color: #00d2ff;}
    .btn-reload { border-color: #d28a5e; color: #d28a5e; display: none; }
    .btn-reload:hover { background-color: #d28a5e; color: white; border-color: #d28a5e;}
    .edit-note {
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      color: #d28a5e;
      text-align: center;
      margin-top: 6px;
      display: none;
      height: 13px;
    }
  </style>
</head>
<body>

  <div class="hard-disk-container">
    <h2 class="main-title">Hard Disk</h2>
    <div class="file-status" id="file-status">NO FILE LOADED</div>

    <div class="trace-log-wrapper" id="trace-log-wrapper">
      <div class="table-container">
        <table class="trace-log-table">
          <thead>
            <tr>
              <th>Address</th>
              <th>Data (Instruction)</th>
              <th>Hex</th>
            </tr>
          </thead>
          <tbody id="trace-log-body">
              </tbody>
        </table>
      </div>
    </div>

    <div class="disk-controls" id="disk-controls">
      <div class="button-grid">
        
        <div class="button-group">
          <h4>Program</h4>
          <div class="actions">
            <button class="btn" id="btn-load">Load</button>
            <button class="btn btn-save" id="btn-save">Save</button>
          </div>
        </div>

        <div class="button-group">
          <h4>Data File</h4>
          <div class="actions">
            <button class="btn" id="btn-open">Open</button>
            <button class="btn btn-edit" id="btn-edit">Edit</button>
          </div>
          <div class="actions" style="margin-top:6px;">
            <button class="btn btn-reload" id="btn-reload" title="Re-parse file after editing in Notepad">↺ Reload</button>
          </div>
          <div class="edit-note" id="edit-note">↑ Click after saving in Notepad</div>
        </div>

      </div>
    </div>

  </div>

  <script>
    const socket = io();

    // Elements
    const traceLogBody = document.getElementById('trace-log-body');
    const fileStatus = document.getElementById('file-status');
    const btnLoad = document.getElementById('btn-load');
    const btnSave = document.getElementById('btn-save');
    const btnOpen = document.getElementById('btn-open');
    const btnEdit = document.getElementById('btn-edit');
    const btnReload = document.getElementById('btn-reload');
    const editNote = document.getElementById('edit-note');

    // --- BUTTON EVENT LISTENERS ---

    // 1. Program: Load
    btnLoad.addEventListener('click', () => {
        socket.emit('hd_request_file_dialog', { type: 'program' });
    });

    // 2. Data File: Open
    btnOpen.addEventListener('click', () => {
        socket.emit('hd_request_file_dialog', { type: 'data' });
    });

    // 3. Program: Save (transfers buffer → RAM with full reset)
    btnSave.addEventListener('click', () => {
        socket.emit('hd_save_to_ram');
    });

    // 4. Data File: Edit — open Notepad, then reveal Reload button
    btnEdit.addEventListener('click', () => {
        socket.emit('hd_edit_file');
        // Show the Reload button so user knows to click it after saving in Notepad
        btnReload.style.display = 'inline-block';
        editNote.style.display = 'block';
        fileStatus.innerText = 'EDITING IN NOTEPAD — RELOAD WHEN DONE';
    });

    // 5. Reload — re-parse the file from disk after external edit
    btnReload.addEventListener('click', () => {
        socket.emit('hd_reload_after_edit');
        fileStatus.innerText = 'RELOADING...';
        btnReload.style.display = 'none';
        editNote.style.display = 'none';
    });

    // --- SOCKET LISTENERS FROM PYTHON ---

    // File successfully loaded/reloaded
    socket.on('hd_file_loaded', (data) => {
        traceLogBody.innerHTML = '';
        fileStatus.innerText = `LOADED: ${data.filename}`;
        btnReload.style.display = 'none';
        editNote.style.display = 'none';
        data.table.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${row.address}</td>
                <td>${row.data}</td>
                <td>${row.hex}</td>
            `;
            traceLogBody.appendChild(tr);
        });
    });

    // Save to RAM completed — buffer cleared
    socket.on('hd_cleared', () => {
        traceLogBody.innerHTML = '';
        fileStatus.innerText = 'BUFFER CLEARED — LOADED INTO RAM';
        setTimeout(() => { fileStatus.innerText = 'NO FILE LOADED'; }, 3000);
    });

    // Errors
    socket.on('hd_error', (data) => {
        alert("Hard Disk Error: " + data.msg);
    });

  </script>

</body>
</html>
