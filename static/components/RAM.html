<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Memory (RAM) Component</title>
  
  <style>
    /* --- GENERAL LAYOUT --- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: transparent; 
      color: #333333; 
      display: flex;
      justify-content: center;
      align-items: stretch; /* Forces the child to stretch vertically */
      padding: 0; /* Removed padding to let it sit flush if needed */
      margin: 0;
      box-sizing: border-box;
      height: 100vh; /* Fills the entire frame height */
      width: 100vw;  /* Fills the entire frame width */
    }

    /* --- RAM CONTAINER --- */
    .ram-container {
      width: 100%; 
      height: 100%; /* Expands to fill the body */
      border: 2px solid #5a5475; 
      background-color: #ffffff; 
      padding: 15px;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    /* Main Title */
    .main-title {
      font-family: 'Courier New', Courier, monospace;
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 20px; 
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #5a5475;
      text-align: center;
    }

    /* --- CONTROLS (Mnemonics & Clear) --- */
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 2px solid #eef0f5;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: #5a5475;
      font-size: 14px;
      cursor: pointer;
    }

    .checkbox-group input {
      margin-right: 8px;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .btn {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #ffffff;
      color: #5a5475;
      border: 2px solid #5a5475; 
      padding: 4px 12px; 
      cursor: pointer;
      font-size: 13px; 
      font-weight: bold;
      text-transform: uppercase; 
      letter-spacing: 1px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: #eef0f5;
      color: #333333;
    }

    /* --- MEMORY SLOTS GRID --- */
    .memory-slots-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-grow: 1; /* This is the magic! It stretches to fill all remaining vertical space */
      overflow-y: auto; /* Adds a scrollbar ONLY if the screen is too tiny */
      padding-right: 5px;
    }

    /* Scrollbar */
    .memory-slots-wrapper::-webkit-scrollbar {
      width: 8px;
    }
    .memory-slots-wrapper::-webkit-scrollbar-track {
      background: #f0f0f5; 
      border-radius: 4px;
    }
    .memory-slots-wrapper::-webkit-scrollbar-thumb {
      background: #b8b4c7; 
      border-radius: 4px;
    }

    .memory-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #f8f8fc;
      border: 1px solid #e2e2ec;
      padding: 4px 8px;
      flex-grow: 1; /* Makes each row stretch slightly to distribute space evenly */
    }

    .memory-address {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: #5a5475;
      width: 30px;
      text-align: right;
      margin-right: 10px;
      font-size: 14px;
    }

    .memory-input {
      flex-grow: 1;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 14px;
      color: #3b7c97;
      border: 1px solid #b8b4c7;
      padding: 4px 8px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%; /* Force input to take remaining width */
    }

    .memory-input:focus {
      border-color: #5a5475;
      background-color: #ffffff;
    }

  </style>
</head>
<body>

  <div class="ram-container">
    <h2 class="main-title">Main Memory (RAM)</h2>

    <div class="top-controls">
      <label class="checkbox-group">
        <input type="checkbox" id="chk-mnemonics" checked>
        Mnemonics
      </label>
      <button class="btn" id="btn-clear">Clear</button>
    </div>

    <div class="memory-slots-wrapper" id="memory-wrapper">
    </div>

  </div>

  <script>
    const memoryWrapper = document.getElementById('memory-wrapper');
    const chkMnemonics = document.getElementById('chk-mnemonics');
    const btnClear = document.getElementById('btn-clear');

    let cachedMemoryInt = Array(16).fill(0);
    let cachedMemoryMnemonics = Array(16).fill("0");

    function buildMemorySlots() {
      for (let i = 0; i < 16; i++) {
        const row = document.createElement('div');
        row.className = 'memory-row';

        const label = document.createElement('div');
        label.className = 'memory-address';
        label.textContent = i;

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'memory-input';
        input.id = `mem-input-${i}`;
        input.value = "0"; 
        
        input.addEventListener('change', (e) => {
          sendUpdateToBackend(i, e.target.value);
        });

        row.appendChild(label);
        row.appendChild(input);
        memoryWrapper.appendChild(row);
      }
    }

    function refreshMemoryDisplay() {
      const useMnemonics = chkMnemonics.checked;
      for (let i = 0; i < 16; i++) {
        const input = document.getElementById(`mem-input-${i}`);
        if (useMnemonics) {
          input.value = cachedMemoryMnemonics[i] === "DATA 0" ? "0" : cachedMemoryMnemonics[i];
        } else {
          input.value = cachedMemoryInt[i];
        }
      }
    }

    function sendUpdateToBackend(address, value) {
      fetch('/memory/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address: address, value: value })
      })
      .then(response => response.json())
      .then(state => {
        cachedMemoryInt = state.memory_int;
        cachedMemoryMnemonics = state.memory_mnemonics;
        refreshMemoryDisplay();
      })
      .catch(err => console.error("Error updating memory:", err));
    }

    btnClear.addEventListener('click', () => {
      fetch('/memory/clear', { method: 'POST' })
      .then(response => response.json())
      .then(state => {
        cachedMemoryInt = state.memory_int;
        cachedMemoryMnemonics = state.memory_mnemonics;
        refreshMemoryDisplay();
      })
      .catch(err => console.error("Error clearing memory:", err));
    });

    chkMnemonics.addEventListener('change', refreshMemoryDisplay);

    // Listen to the master clock ticks from the CPU module to auto-update during execution!
    window.addEventListener('timm-tick', (event) => {
        const state = event.detail; 
        cachedMemoryInt = state.memory_int;
        cachedMemoryMnemonics = state.memory_mnemonics;
        refreshMemoryDisplay();
    });

    buildMemorySlots();
    btnClear.click();

  </script>
</body>
</html>
