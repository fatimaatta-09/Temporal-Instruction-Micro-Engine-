<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Memory (RAM) Component</title>
  
  <script src="/static/socket.io.min.js"></script>

  <style>
    /* --- GENERAL LAYOUT --- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: transparent; 
      color: #333333; 
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 0; 
      margin: 0;
      box-sizing: border-box;
      height: 100vh; 
      width: 100vw;  
    }

    /* --- RAM CONTAINER --- */
    .ram-container {
      width: 100%; 
      height: 100%; 
      border: 2px solid #5a5475; 
      background-color: #ffffff; 
      padding: 15px;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    /* Main Title */
    .main-title {
      font-family: 'Courier New', Courier, monospace;
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 20px; 
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #5a5475;
      text-align: center;
    }

    /* --- CONTROLS --- */
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 2px solid #eef0f5;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: #5a5475;
      font-size: 14px;
      cursor: pointer;
    }

    .checkbox-group input {
      margin-right: 8px;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .btn {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #ffffff;
      color: #5a5475;
      border: 2px solid #5a5475; 
      padding: 4px 12px; 
      cursor: pointer;
      font-size: 13px; 
      font-weight: bold;
      text-transform: uppercase; 
      letter-spacing: 1px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: #eef0f5;
      color: #333333;
    }

    /* --- MEMORY SLOTS GRID --- */
    .memory-slots-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-grow: 1; 
      overflow-y: auto; 
      padding-right: 5px;
    }

    /* Scrollbar */
    .memory-slots-wrapper::-webkit-scrollbar { width: 8px; }
    .memory-slots-wrapper::-webkit-scrollbar-track { background: #f0f0f5; border-radius: 4px; }
    .memory-slots-wrapper::-webkit-scrollbar-thumb { background: #b8b4c7; border-radius: 4px; }

    .memory-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #f8f8fc;
      border: 1px solid #e2e2ec;
      padding: 4px 8px;
      flex-grow: 1; 
    }

    .memory-address {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: #5a5475;
      width: 30px;
      text-align: right;
      margin-right: 10px;
      font-size: 14px;
    }

    .memory-input {
      flex-grow: 1;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 14px;
      color: #3b7c97;
      border: 1px solid #b8b4c7;
      padding: 4px 8px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .memory-input:focus {
      border-color: #5a5475;
      background-color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="ram-container">
    <h2 class="main-title">Main Memory (RAM)</h2>

    <div class="top-controls">
      <label class="checkbox-group">
        <input type="checkbox" id="chk-mnemonics" checked>
        Mnemonics
      </label>
      <button class="btn" id="btn-clear">Clear</button>
    </div>

    <div class="memory-slots-wrapper" id="memory-wrapper">
      </div>

  </div>

  <script>
    const socket = io();
    
    const memoryWrapper = document.getElementById('memory-wrapper');
    const chkMnemonics = document.getElementById('chk-mnemonics');
    const btnClear = document.getElementById('btn-clear');

    // Local cached states updated via websockets
    let cachedMemoryBin = Array(16).fill("00000000");
    let cachedMemoryMnemonics = Array(16).fill("NOP");

    // 1. Build the 16 slots dynamically
    function buildMemorySlots() {
      for (let i = 0; i < 16; i++) {
        const row = document.createElement('div');
        row.className = 'memory-row';

        const label = document.createElement('div');
        label.className = 'memory-address';
        // Display Address as Hex (0-F)
        label.textContent = i.toString(16).toUpperCase();

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'memory-input';
        input.id = `mem-input-${i}`;
        input.value = "NOP"; 
        
        // When the user clicks away or hits enter, send to Python
        input.addEventListener('change', (e) => {
          socket.emit('update_memory_slot', { address: i, value: e.target.value });
        });

        row.appendChild(label);
        row.appendChild(input);
        memoryWrapper.appendChild(row);
      }
    }

    // 2. Refresh visuals based on the checkbox toggle
    function refreshMemoryDisplay() {
      const useMnemonics = chkMnemonics.checked;
      for (let i = 0; i < 16; i++) {
        const input = document.getElementById(`mem-input-${i}`);
        if (useMnemonics) {
          input.value = cachedMemoryMnemonics[i];
        } else {
          input.value = cachedMemoryBin[i]; // Raw 8-bit Binary
        }
      }
    }

    // --- SOCKET LISTENERS ---

    // Ask backend for current memory state on load
    socket.emit('request_memory_sync');

    socket.on('memory_sync', (state) => {
        cachedMemoryBin = state.memory_bin;
        cachedMemoryMnemonics = state.memory_mnem;
        refreshMemoryDisplay();
    });

    btnClear.addEventListener('click', () => {
      socket.emit('clear_memory');
    });

    chkMnemonics.addEventListener('change', refreshMemoryDisplay);

    // Build the grid immediately on page load
    buildMemorySlots();

  </script>
</body>
</html>
