<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Logs Component</title>
  
  <script src="/static/socket.io.min.js"></script>

  <style>
    /* --- RAW IC HARDWARE AESTHETIC --- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #ffffff; 
      border: 2px solid #5a5475; 
      border-radius: 8px; 
      color: #333333;
      display: flex;
      flex-direction: column;
      margin: 0;
      height: 100vh; 
      box-sizing: border-box;
      overflow: hidden; 
    }

    /* --- SLEEK IC HEADER --- */
    .ic-header {
      background-color: #f8f8fc; 
      border-bottom: 2px solid #e2e2ec; 
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ic-title {
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      font-weight: bold;
      color: #333333;
      letter-spacing: 0.5px;
    }

    /* Circular 'X' close button */
    .ic-close-btn {
      background: #eef0f5;
      border: 1px solid #b8b4c7;
      border-radius: 50%; 
      width: 24px;
      height: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #5a5475;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .ic-close-btn:hover {
      background: #c95c5a;
      color: #ffffff;
      border-color: #c95c5a;
    }

    /* --- IC BODY --- */
    .ic-body {
      padding: 15px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
      overflow: hidden;
    }

    /* --- LOGS TABLE WRAPPER --- */
    .logs-wrapper {
      width: 100%;
      flex-grow: 1; 
      border: 1px solid #b8b4c7;
      border-radius: 4px;
      overflow-y: auto;
      background-color: #ffffff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
    }

    th {
      background-color: #5a5475;
      color: #ffffff;
      padding: 12px 10px;
      text-align: left;
      position: sticky; 
      top: 0;
      font-weight: bold;
      letter-spacing: 1px;
    }

    td {
      padding: 12px 10px;
      color: #555555;
      text-align: left;
      border-bottom: 1px solid #e2e2ec;
    }

    /* Highlight rows slightly when hovering */
    tr:hover td {
        background-color: #f8f8fc;
    }

    /* Status Color Coding */
    .status-buffered { color: #d28a5e; font-weight: bold; }
    .status-broadcast { color: #d42df2; font-weight: bold; }
  </style>
</head>
<body>

  <div class="ic-header">
    <div class="ic-title">NETWORK TRAFFIC LOGS</div>
    <button class="ic-close-btn" id="hide-logs-btn">✕</button>
  </div>

  <div class="ic-body">
    <div class="logs-wrapper">
      <table>
        <thead>
          <tr>
            <th>TIMESTAMP</th>
            <th>SOURCE</th>
            <th>DATA PAYLOAD</th>
            <th>STATUS</th>
          </tr>
        </thead>
        <tbody id="logs-body">
          <tr>
            <td colspan="4" style="text-align: center; font-style: italic;">Awaiting network activity...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const socket = io();
    const logsBody = document.getElementById('logs-body');

    // --- 1. SECURE MODAL CLOSE LOGIC (Kept Intact for your Mainframe) ---
    document.getElementById('hide-logs-btn').addEventListener('click', function() {
      if (window.parent) {
        window.parent.postMessage({ action: 'closeNetworkLogsPopup' }, '*');
      }
    });

    // --- 2. FETCH DATA ON LOAD ---
    // The moment this iframe is opened/loaded, ask Python for the logs
    socket.emit('request_network_logs');

    // --- 3. RENDER THE LOGS ---
    socket.on('deliver_network_logs', (data) => {
        logsBody.innerHTML = ''; // Clear table
        
        if (data.logs.length === 0) {
            logsBody.innerHTML = '<tr><td colspan="4" style="text-align: center; font-style: italic;">No activity yet.</td></tr>';
            return;
        }
        
        // Reverse the array so the newest logs appear at the top of the table
        [...data.logs].reverse().forEach(log => {
            const row = document.createElement('tr');
            
            // Assign specific CSS classes based on the status for cool coloring
            let statusClass = '';
            if (log.status === 'Buffered') statusClass = 'status-buffered';
            if (log.status === 'Broadcast') statusClass = 'status-broadcast';

            row.innerHTML = `
                <td>${log.time}</td>
                <td><strong>${log.source}</strong></td>
                <td style="font-family: monospace; font-size: 16px;">${log.payload}</td>
                <td class="${statusClass}">${log.status}</td>
            `;
            logsBody.appendChild(row);
        });
    });

    // --- 4. AUTO-REFRESH LISTENER ---
    // If the modal is left open while the CPU is running, it will listen to the same
    // events the LAN uses, and automatically refresh the table live!
    socket.on('update_nc_buffer_ui', () => {
        socket.emit('request_network_logs');
    });

    socket.on('network_broadcast_rx', () => {
        socket.emit('request_network_logs');
    });

  </script>

</body>
</html>
